name: TDnet Daily Monitor

on:
  schedule:
    # 毎日 09:00 UTC = 18:00 JST
    - cron: "0 9 * * *"
  workflow_dispatch:  # 手動実行ボタンを有効化

permissions:
  contents: write  # docs/ への push に必要

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
      JQUANTS_EMAIL: ${{ secrets.JQUANTS_EMAIL }}
      JQUANTS_PASSWORD: ${{ secrets.JQUANTS_PASSWORD }}
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run TDnet Monitor
        working-directory: scripts
        env:
          TARGET_DATE: "2026-04-10"   # ← 直近の営業日を指定
        run: python main.py

      - name: Commit and push GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "docs" ] && [ -n "$(ls -A docs/ 2>/dev/null)" ]; then
            git add docs/
            git diff --cached --quiet || (git commit -m "Update disclosures $(date +%Y-%m-%d)" && git push)
          else
            echo "No docs to commit (market closed or no disclosures)."
          fi