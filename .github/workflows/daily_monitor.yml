name: TDnet Daily Monitor

on:
  schedule:
    # 18:00 JST = 09:00 UTC
    - cron: "0 9 * * *"
    # 24:00 JST = 15:00 UTC
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Run mode: evening (00:00-18:00) or night (18:01-24:00)"
        required: false
        default: "evening"
        type: choice
        options:
          - evening
          - night

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    env:
      GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
      TZ: Asia/Tokyo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RUN_MODE=${{ github.event.inputs.run_mode }}" >> $GITHUB_ENV
          elif [ "$(date +%H)" -ge 12 ]; then
            echo "RUN_MODE=night" >> $GITHUB_ENV
          else
            echo "RUN_MODE=evening" >> $GITHUB_ENV
          fi
          echo "Run mode: $RUN_MODE"

      - name: Run TDnet Monitor
        working-directory: scripts
        run: python main.py

      - name: Commit and push GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "docs" ] && [ -n "$(ls -A docs/ 2>/dev/null)" ]; then
            git add --force docs/index.html
            git add --force docs/data/
            git diff --cached --quiet || (git commit -m "Update disclosures $(date +%Y-%m-%d) [${RUN_MODE}]" && git push)
          else
            echo "No docs to commit (market closed or no disclosures)."
          fi
